<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>評選流程自動化系統 - 雲端修復版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .timer-display { font-family: 'JetBrains+Mono', monospace; font-size: 26vw; line-height: 0.9; text-shadow: 0 0 50px rgba(59, 130, 246, 0.4); }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center; padding: 20px; }
        .btn-active:active { transform: scale(0.95); }
        .glow-red { text-shadow: 0 0 60px rgba(239, 68, 68, 0.8); }
    </style>
</head>
<body>

    <!-- 啟動遮罩 -->
    <div id="overlay" onclick="setupAudio()">
        <div class="bg-blue-600 p-8 rounded-full mb-6 animate-pulse">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
        </div>
        <h1 class="text-4xl font-bold mb-4">點擊啟動雲端音訊系統</h1>
        <p class="text-slate-400">點擊此處解除瀏覽器靜音限制，並載入 Google Drive 音檔</p>
    </div>

    <!-- 倒數顯示區 -->
    <div class="flex-none pt-4 flex flex-col items-center justify-center">
        <div id="timer" class="timer-display font-bold text-blue-400">15:00</div>
        <div id="message" class="text-5xl mt-2 text-slate-400 tracking-[1rem] font-bold">準備開始</div>
    </div>

    <!-- 狀態列 -->
    <div class="flex-none flex justify-center mt-4">
        <div class="bg-slate-800/50 border border-slate-700 rounded-full px-6 py-1 flex items-center gap-3">
            <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-600"></span>
            <span id="speechStatus" class="text-slate-400 text-sm font-medium tracking-wider">等待初始化...</span>
        </div>
    </div>

    <!-- 控制區 -->
    <div class="flex-grow flex flex-col items-center justify-end bg-slate-900/50 border-t border-slate-800 p-10 pb-16">
        <div class="flex gap-10 mb-12">
            <button onclick="playFullAnnouncement()" class="px-10 py-5 bg-indigo-700 hover:bg-indigo-600 rounded-2xl text-2xl font-bold transition-all btn-active shadow-xl">📢 播放大會說明</button>
            <button id="startBtn" class="px-12 py-5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-2xl font-bold transition-all btn-active shadow-xl">▶ 開始計時</button>
            <button id="pauseBtn" class="hidden px-10 py-5 bg-amber-600 hover:bg-amber-500 rounded-2xl text-2xl font-bold transition-all btn-active shadow-xl">⏸ 暫停</button>
        </div>
        <div class="flex gap-6 w-full max-w-4xl justify-center">
            <button onclick="playShortBell()" class="flex-1 py-4 bg-slate-800 border border-slate-700 rounded-xl hover:bg-slate-700 transition-all btn-active flex items-center justify-center gap-2">🔔 短鈴</button>
            <button onclick="playLongBell()" class="flex-1 py-4 bg-slate-800 border border-slate-700 rounded-xl hover:bg-slate-700 transition-all btn-active flex items-center justify-center gap-2">📢 長鈴</button>
            <button id="resetBtn" class="px-10 py-4 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-slate-300 transition-all btn-active">重設</button>
        </div>
    </div>

    <script>
        // 您的專屬 Google Drive 網址
        const AUDIO_URLS = {
            intro: "https://drive.google.com/uc?export=download&id=1Ahj4SJp5aztqxBQ4IIDr36oVdiXH8eCP", 
            short: "https://drive.google.com/uc?export=download&id=171jZTaIBuTNWWbURtSLDfk8Jg5gu5lfy",
            long:  "https://drive.google.com/uc?export=download&id=1fe7ezTuCPG4QPHJY8kUG61uHuyVEz80_"
        };

        let introAudio, shortAudio, longAudio;
        let timeLeft = 15 * 60; 
        let timerId = null;
        let audioInitialized = false;

        const timerDisplay = document.getElementById('timer');
        const messageDisplay = document.getElementById('message');
        const speechStatus = document.getElementById('speechStatus');
        const statusDot = document.getElementById('statusDot');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const overlay = document.getElementById('overlay');

        function setupAudio() {
            if (audioInitialized) return;
            
            speechStatus.textContent = "正在連接雲端音檔...";

            const createAudio = (url) => {
                const a = new Audio(url);
                // ⚠️ 移除 crossOrigin 屬性！這是導致 Google Drive 擋住連線的元兇 ⚠️
                a.preload = "auto";
                return a;
            };

            introAudio = createAudio(AUDIO_URLS.intro);
            shortAudio = createAudio(AUDIO_URLS.short);
            longAudio = createAudio(AUDIO_URLS.long);

            const unlock = (a) => {
                a.play().then(() => { 
                    a.pause(); 
                    a.currentTime = 0; 
                }).catch(e => console.warn("等待播放解鎖"));
            };

            [introAudio, shortAudio, longAudio].forEach(unlock);

            audioInitialized = true;
            overlay.style.display = 'none';
            statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
            speechStatus.textContent = "Google Drive 音檔連接成功";
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 0.9;
            speechStatus.textContent = "TTS播報：" + text;
            window.speechSynthesis.speak(msg);
        }

        function playFullAnnouncement() {
            if (!audioInitialized) return;
            speechStatus.textContent = "正在播放：大會說明...";
            introAudio.currentTime = 0;
            introAudio.play().catch(e => {
                speechStatus.textContent = "播放失敗！Google Drive 可能封鎖了要求";
                console.error("Intro 播放錯誤:", e);
            });
        }

        function playShortBell() {
            if (!audioInitialized) return;
            speechStatus.textContent = "正在播放：短鈴...";
            shortAudio.currentTime = 0;
            shortAudio.play().catch(e => {
                speechStatus.textContent = "播放失敗！Google Drive 可能封鎖了要求";
            });
        }

        function playLongBell() {
            if (!audioInitialized) return;
            speechStatus.textContent = "正在播放：長鈴...";
            longAudio.currentTime = 0;
            longAudio.play().catch(e => {
                speechStatus.textContent = "播放失敗！Google Drive 可能封鎖了要求";
            });
        }

        function startTimer() {
            if (timerId) return;
            startBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            timerId = setInterval(() => {
                timeLeft--;
                const elapsed = (15 * 60) - timeLeft;
                if (elapsed === 590) speak("剩下5分鐘");
                if (elapsed === 880) playShortBell();
                if (elapsed === 890) playLongBell();
                if (timeLeft <= 0) { clearInterval(timerId); timerId = null; }
                updateDisplay();
            }, 1000);
        }

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if (timeLeft <= 10) {
                timerDisplay.className = "timer-display font-bold text-red-500 animate-pulse glow-red";
                messageDisplay.textContent = "評選結束";
            } else if (timeLeft <= 310) {
                messageDisplay.textContent = "剩下5分鐘";
                timerDisplay.className = "timer-display font-bold text-amber-400";
            } else {
                timerDisplay.className = "timer-display font-bold text-blue-400";
                messageDisplay.textContent = "評選進行中";
            }
        }

        function resetTimer() {
            clearInterval(timerId); timerId = null;
            timeLeft = 15 * 60;
            window.speechSynthesis.cancel();
            [introAudio, shortAudio, longAudio].forEach(a => { a.pause(); a.currentTime = 0; });
            updateDisplay();
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            speechStatus.textContent = "重設完畢";
        }

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', () => {
            clearInterval(timerId); timerId = null;
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
        });
        document.getElementById('resetBtn').addEventListener('click', resetTimer);
        updateDisplay();
    </script>
</body>
</html>
