<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>評選流程自動化系統 - 本地無敵版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .timer-display { font-family: 'JetBrains+Mono', monospace; font-size: 26vw; line-height: 0.9; text-shadow: 0 0 50px rgba(59, 130, 246, 0.4); }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .btn-active:active { transform: scale(0.95); }
        .glow-red { text-shadow: 0 0 60px rgba(239, 68, 68, 0.8); }
        
        /* 隱藏預設上傳按鈕，自訂樣式 */
        input[type="file"] { display: none; }
        .custom-file-upload {
            border: 2px dashed #3b82f6;
            display: inline-block;
            padding: 20px 40px;
            cursor: pointer;
            border-radius: 1rem;
            background: rgba(59, 130, 246, 0.1);
            transition: all 0.3s;
        }
        .custom-file-upload:hover { background: rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body>

    <!-- 啟動遮罩：改為上傳檔案介面 -->
    <div id="overlay">
        <div class="bg-blue-600 p-6 rounded-full mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" /></svg>
        </div>
        <h1 class="text-4xl font-bold mb-4">第一步：載入音檔</h1>
        <p class="text-slate-400 max-w-lg mb-8">為了突破瀏覽器封鎖，請點擊下方按鈕，並「同時選取」您的三個音檔（大會說明、短鈴、長鈴）。</p>
        
        <label class="custom-file-upload group">
            <input type="file" id="audioUpload" accept="audio/*" multiple />
            <span class="text-2xl font-bold text-blue-400 group-hover:text-blue-300">📁 點擊這裡選擇音檔</span>
        </label>
        
        <div id="uploadStatus" class="mt-6 text-amber-400 font-medium h-6"></div>
    </div>

    <!-- 倒數顯示區 -->
    <div class="flex-none pt-4 flex flex-col items-center justify-center">
        <div id="timer" class="timer-display font-bold text-blue-400">15:00</div>
        <div id="message" class="text-5xl mt-2 text-slate-400 tracking-[1rem] font-bold">準備開始</div>
    </div>

    <!-- 狀態列 -->
    <div class="flex-none flex justify-center mt-4">
        <div class="bg-slate-800/50 border border-slate-700 rounded-full px-6 py-1 flex items-center gap-3">
            <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-600"></span>
            <span id="speechStatus" class="text-slate-400 text-sm font-medium tracking-wider">等待初始化...</span>
        </div>
    </div>

    <!-- 控制區 -->
    <div class="flex-grow flex flex-col items-center justify-end bg-slate-900/50 border-t border-slate-800 p-10 pb-16">
        <div class="flex gap-10 mb-12">
            <button onclick="playFullAnnouncement()" class="px-10 py-5 bg-indigo-700 hover:bg-indigo-600 rounded-2xl text-2xl font-bold transition-all btn-active shadow-xl">📢 播放大會說明</button>
            <button id="startBtn" class="px-12 py-5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-2xl font-bold transition-all btn-active shadow-xl">▶ 開始計時</button>
            <button id="pauseBtn" class="hidden px-10 py-5 bg-amber-600 hover:bg-amber-500 rounded-2xl text-2xl font-bold transition-all btn-active shadow-xl">⏸ 暫停</button>
        </div>
        <div class="flex gap-6 w-full max-w-4xl justify-center">
            <button onclick="playShortBell()" class="flex-1 py-4 bg-slate-800 border border-slate-700 rounded-xl hover:bg-slate-700 transition-all btn-active flex items-center justify-center gap-2">🔔 短鈴</button>
            <button onclick="playLongBell()" class="flex-1 py-4 bg-slate-800 border border-slate-700 rounded-xl hover:bg-slate-700 transition-all btn-active flex items-center justify-center gap-2">📢 長鈴</button>
            <button id="resetBtn" class="px-10 py-4 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-slate-300 transition-all btn-active">重設</button>
        </div>
    </div>

    <script>
        let introAudio = new Audio();
        let shortAudio = new Audio();
        let longAudio = new Audio();
        
        let timeLeft = 15 * 60; 
        let timerId = null;
        let audioInitialized = false;

        const timerDisplay = document.getElementById('timer');
        const messageDisplay = document.getElementById('message');
        const speechStatus = document.getElementById('speechStatus');
        const statusDot = document.getElementById('statusDot');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const overlay = document.getElementById('overlay');
        const uploadStatus = document.getElementById('uploadStatus');

        // 處理使用者選擇的檔案
        document.getElementById('audioUpload').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length === 0) return;

            let loadedCount = 0;

            for (let file of files) {
                const url = URL.createObjectURL(file);
                const fileName = file.name.toLowerCase();

                // 根據檔名關鍵字自動分配音軌
                if (fileName.includes('intro') || fileName.includes('大會')) {
                    introAudio.src = url;
                    loadedCount++;
                } else if (fileName.includes('short') || fileName.includes('短')) {
                    shortAudio.src = url;
                    loadedCount++;
                } else if (fileName.includes('long') || fileName.includes('長')) {
                    longAudio.src = url;
                    loadedCount++;
                }
            }

            if (loadedCount > 0) {
                // 執行靜音解鎖
                [introAudio, shortAudio, longAudio].forEach(a => {
                    if(a.src) {
                        a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(e => console.warn(e));
                    }
                });

                audioInitialized = true;
                overlay.style.display = 'none';
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                speechStatus.textContent = `成功載入音檔，系統就緒！`;
            } else {
                uploadStatus.textContent = "⚠️ 無法辨識檔名！請確認檔名包含 intro, short 或 long";
            }
        });

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 0.9;
            speechStatus.textContent = "自動播報中：" + text;
            window.speechSynthesis.speak(msg);
        }

        function playFullAnnouncement() {
            if (!audioInitialized || !introAudio.src) return alert("尚未載入大會說明音檔！");
            speechStatus.textContent = "正在播放：大會說明...";
            introAudio.currentTime = 0;
            introAudio.play().catch(e => console.error(e));
        }

        function playShortBell() {
            if (!audioInitialized || !shortAudio.src) return;
            speechStatus.textContent = "正在播放：短鈴...";
            shortAudio.currentTime = 0;
            shortAudio.play().catch(e => console.error(e));
        }

        function playLongBell() {
            if (!audioInitialized || !longAudio.src) return;
            speechStatus.textContent = "正在播放：長鈴...";
            longAudio.currentTime = 0;
            longAudio.play().catch(e => console.error(e));
        }

        function startTimer() {
            if (timerId) return;
            startBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            speechStatus.textContent = "計時開始";
            
            timerId = setInterval(() => {
                timeLeft--;
                const elapsed = (15 * 60) - timeLeft;
                
                if (elapsed === 590) speak("剩下5分鐘");
                if (elapsed === 880) playShortBell();
                if (elapsed === 890) playLongBell();
                
                if (timeLeft <= 0) { clearInterval(timerId); timerId = null; }
                updateDisplay();
            }, 1000);
        }

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if (timeLeft <= 10) {
                timerDisplay.className = "timer-display font-bold text-red-500 animate-pulse glow-red";
                messageDisplay.textContent = "評選結束";
            } else if (timeLeft <= 310) {
                messageDisplay.textContent = "剩下5分鐘";
                timerDisplay.className = "timer-display font-bold text-amber-400";
            } else {
                timerDisplay.className = "timer-display font-bold text-blue-400";
                messageDisplay.textContent = "評選進行中";
            }
        }

        function resetTimer() {
            clearInterval(timerId); timerId = null;
            timeLeft = 15 * 60;
            window.speechSynthesis.cancel();
            [introAudio, shortAudio, longAudio].forEach(a => { if(a.src) { a.pause(); a.currentTime = 0; } });
            updateDisplay();
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            speechStatus.textContent = "重設完畢";
        }

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', () => {
            clearInterval(timerId); timerId = null;
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            speechStatus.textContent = "已暫停";
        });
        document.getElementById('resetBtn').addEventListener('click', resetTimer);
        updateDisplay();
    </script>
</body>
</html>
