<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投影專用倒數計時器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'JetBrains+Mono', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .timer-display {
            font-size: 25vw; 
            line-height: 1;
            text-shadow: 0 0 40px rgba(59, 130, 246, 0.6);
        }

        .btn-active:active {
            transform: scale(0.95);
        }
        
        .glow-red {
            text-shadow: 0 0 50px rgba(239, 68, 68, 0.8);
        }
    </style>
</head>
<body>

    <!-- 上半部：倒數計時顯示區域 -->
    <div class="flex-none pt-12 flex flex-col items-center justify-start h-2/3">
        <div id="timer" class="timer-display font-bold text-blue-400">15:00</div>
        <div id="message" class="text-4xl mt-6 text-slate-400 font-sans tracking-widest">準備開始</div>
    </div>

    <!-- 下半部：控制與按鈕區域 -->
    <div class="flex-grow flex flex-col items-center justify-center bg-slate-900/80 border-t-2 border-slate-800 p-8">
        
        <div class="flex gap-8 mb-10">
            <button id="startBtn" class="px-12 py-5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-3xl font-bold transition-all btn-active shadow-lg shadow-emerald-900/20">
                開始計時
            </button>
            <button id="pauseBtn" class="px-12 py-5 bg-amber-600 hover:bg-amber-500 rounded-2xl text-3xl font-bold transition-all btn-active hidden shadow-lg shadow-amber-900/20">
                暫停
            </button>
            <button id="resetBtn" class="px-12 py-5 bg-slate-700 hover:bg-slate-600 rounded-2xl text-3xl font-bold transition-all btn-active shadow-lg shadow-slate-900/20">
                重設
            </button>
        </div>

        <div class="grid grid-cols-2 gap-10 w-full max-w-4xl">
            <button onclick="playShortBell()" class="flex flex-col items-center justify-center p-8 bg-indigo-900/40 border-2 border-indigo-500/50 rounded-3xl hover:bg-indigo-800 transition-all btn-active shadow-xl">
                <span class="text-5xl mb-3">🔔</span>
                <span class="text-2xl font-bold">手動短鈴 (2.0秒)</span>
            </button>
            <button onclick="playLongBell()" class="flex flex-col items-center justify-center p-8 bg-rose-900/40 border-2 border-rose-500/50 rounded-3xl hover:bg-rose-800 transition-all btn-active shadow-xl">
                <span class="text-5xl mb-3">📢</span>
                <span class="text-2xl font-bold">手動長鈴 (4.5秒)</span>
            </button>
        </div>

        <div class="mt-8 text-slate-500 text-xl font-sans">
            自動提醒：14:40 (短) | 14:50 (長)
        </div>
    </div>

    <script>
        let timeLeft = 15 * 60; 
        let timerId = null;
        const totalDuration = 15 * 60;
        
        const timerDisplay = document.getElementById('timer');
        const messageDisplay = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        /**
         * 模擬高頻清脆鈴音
         */
        function createRealisticBell(duration) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const now = audioCtx.currentTime;
            
            // 基礎頻率提升至 1046.50Hz (C6 高音)，更清晰具穿透力
            const baseFreq = 1046.50;
            const partials = [
                { freq: baseFreq, gain: 0.6, type: 'triangle' },     // 基音
                { freq: baseFreq * 2.0, gain: 0.2, type: 'sine' },   // 純諧波
                { freq: baseFreq * 2.51, gain: 0.15, type: 'sine' }, // 擬真金屬諧波
                { freq: baseFreq * 3.1, gain: 0.1, type: 'sine' }    // 高頻閃爍感
            ];

            const masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);

            // 包絡線：極速撞擊與自然衰減
            masterGain.gain.setValueAtTime(0, now);
            masterGain.gain.linearRampToValueAtTime(1, now + 0.002); 
            masterGain.gain.exponentialRampToValueAtTime(0.001, now + duration);

            partials.forEach(p => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                
                osc.type = p.type;
                osc.frequency.setValueAtTime(p.freq, now);
                
                // 加入微微的顫動，讓聲音更生動
                const lfo = audioCtx.createOscillator();
                const lfoGain = audioCtx.createGain();
                lfo.frequency.setValueAtTime(6, now); 
                lfoGain.gain.setValueAtTime(p.freq * 0.001, now);
                lfo.connect(lfoGain);
                lfoGain.connect(osc.frequency);
                lfo.start(now);
                lfo.stop(now + duration);

                g.gain.setValueAtTime(p.gain, now);
                
                osc.connect(g);
                g.connect(masterGain);
                
                osc.start(now);
                osc.stop(now + duration);
            });

            // 強化撞擊的高頻「點」聲
            const impact = audioCtx.createOscillator();
            const impactGain = audioCtx.createGain();
            impact.type = 'sine';
            impact.frequency.setValueAtTime(baseFreq * 4, now);
            impactGain.gain.setValueAtTime(0.4, now);
            impactGain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            impact.connect(impactGain);
            impactGain.connect(masterGain);
            impact.start(now);
            impact.stop(now + 0.05);
        }

        function playShortBell() {
            createRealisticBell(2.0);
        }

        function playLongBell() {
            createRealisticBell(4.5);
        }

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 10) {
                timerDisplay.className = "timer-display font-bold text-red-500 animate-pulse glow-red";
                messageDisplay.textContent = "請即結束！";
                messageDisplay.classList.add('text-red-400');
            } else if (timeLeft <= 20) {
                timerDisplay.className = "timer-display font-bold text-amber-400";
                messageDisplay.textContent = "最後提醒";
                messageDisplay.classList.remove('text-red-400');
            } else {
                timerDisplay.className = "timer-display font-bold text-blue-400";
                messageDisplay.textContent = "計時進行中";
            }
        }

        function startTimer() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (timerId) return;

            startBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');

            timerId = setInterval(() => {
                timeLeft--;
                const elapsed = totalDuration - timeLeft;
                
                if (elapsed === 880) playShortBell();
                if (elapsed === 890) playLongBell();

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    timeLeft = 0;
                    playLongBell();
                    messageDisplay.textContent = "時間到";
                }
                updateDisplay();
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerId);
            timerId = null;
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            messageDisplay.textContent = "已暫停";
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = 15 * 60;
            updateDisplay();
            messageDisplay.textContent = "準備開始";
        }

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        document.getElementById('resetBtn').addEventListener('click', resetTimer);

        updateDisplay();
    </script>
</body>
</html>
